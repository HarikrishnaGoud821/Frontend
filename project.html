           console.log("******************************** 2.Operations  ***********************************************");
           let a = 20;
           let b = 10;
           console.log("1.ARITHMATIC OPERATIONS")
           console.log("ADDITION :",a+b);
           console.log("SUBTRACTION :",a-b);
           console.log("MULTIPLECTION :",a*b);
           console.log("DIVISION :",a/b);

           console.log(a," < ",b," = ",a<b);

           console.log(a," == ",b," = ",a==b);
        
           console.log("3.BITWISE OPERATION");
           console.log(a," || ",b," = ",a || b);
           console.log(a," != ",b," = ",a!= b);
           console.log(a," && ",b," = ",a&&b);


           /*

           */
          console.log("*************************  LOOPS ******************************");
           console.log("Switch Statement");
           let num = Number(prompt("ENTER THE NUMBER(1-7) :"));
           switch(num){
            case 1:
                console.log("MONDAY");
                break;
            case 2:
                console.log("TUESDAY");
                break;
            case 3:
                console.log("WEDNESDAY");
                break;
            case 4:
                console.log("THURSDAY");
                break;
            case 5:
                console.log("FRIDAY");
                break;
            case 6:
                console.log("SATURDAY");
                break;
            case 7:
                console.log("SUNDAY");
                break;
            default:
                console.log("ENTER THE VALID INPUT ❌")
           }
